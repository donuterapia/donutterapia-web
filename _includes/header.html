        <div class="flex justify-between items-center">
            <!-- Logo -->
            <a href="{{ '/' | relative_url }}" class="flex items-center hover:opacity-80 transition-opacity">
                <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Donut Terapia Logo" class="h-16 w-auto object-contain">
            </a>
            
            <!-- Desktop Navigation -->
            <div class="hidden md:flex items-center space-x-8">

            <!-- Mobile Menu Button -->
            <button id="mobileMenuButton" class="md:hidden text-dt-donut">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">

        <!-- Mobile Menu -->
