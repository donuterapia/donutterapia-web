<!-- Header & Navigation -->
<header class="sticky top-0 z-50 bg-black/90 backdrop-blur-sm border-b border-dt-donut/20">
    <nav class="container mx-auto px-4 py-4">
        <div class="flex justify-between items-center">
            <!-- Logo -->
            <a href="{{ '/' | relative_url }}" class="flex items-center hover:opacity-80 transition-opacity">
                <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Donut Terapia Logo" class="h-16 w-auto object-contain">
            </a>
            
            <!-- Desktop Navigation -->
            <div class="hidden md:flex items-center space-x-8">
                <a href="{{ '/' | relative_url }}" class="text-dt-yellow-400 hover:text-dt-donut font-medium transition-colors">Inicio</a>
                <a href="{{ '/menu/' | relative_url }}" class="text-dt-yellow-400 hover:text-dt-donut font-medium transition-colors">Menú</a>
                <a href="{{ '/franquicia/' | relative_url }}" class="text-dt-yellow-400 hover:text-dt-donut font-medium transition-colors">Franquicias</a>
                <a href="{{ '/nosotros/' | relative_url }}" class="text-dt-yellow-400 hover:text-dt-donut font-medium transition-colors">Acerca de</a>
                <a href="{{ '/locales/' | relative_url }}" class="text-dt-yellow-400 hover:text-dt-donut font-medium transition-colors">Ubicaciones</a>
                <a href="{{ '/contacto/' | relative_url }}" class="text-dt-yellow-400 hover:text-dt-donut font-medium transition-colors">Contacto</a>
                <a data-cart-button href="{{ '/carrito/' | relative_url }}" class="bg-dt-glacing text-white px-6 py-2 rounded-full font-semibold hover:bg-red-600 transition-colors inline-block">
                    Ordenar Ahora
                </a>
            </div>
            
            <!-- Mobile Menu Button -->
            <button id="mobileMenuButton" class="md:hidden text-dt-donut">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobileMenu" class="md:hidden hidden mt-4 pb-4">
            <div class="flex flex-col space-y-4">
                <a href="{{ '/' | relative_url }}" class="text-dt-yellow-400 hover:text-dt-donut font-medium transition-colors">Inicio</a>
                <a href="{{ '/menu/' | relative_url }}" class="text-dt-yellow-400 hover:text-dt-donut font-medium transition-colors">Menú</a>
                <a href="{{ '/franquicia/' | relative_url }}" class="text-dt-yellow-400 hover:text-dt-donut font-medium transition-colors">Franquicias</a>
                <a href="{{ '/nosotros/' | relative_url }}" class="text-dt-yellow-400 hover:text-dt-donut font-medium transition-colors">Acerca de</a>
                <a href="{{ '/locales/' | relative_url }}" class="text-dt-yellow-400 hover:text-dt-donut font-medium transition-colors">Ubicaciones</a>
                <a href="{{ '/contacto/' | relative_url }}" class="text-dt-yellow-400 hover:text-dt-donut font-medium transition-colors">Contacto</a>
                <a data-cart-button href="{{ '/carrito/' | relative_url }}" class="bg-dt-glacing text-white px-6 py-2 rounded-full font-semibold hover:bg-red-600 transition-colors block text-center">
                    Ordenar Ahora
                </a>
            </div>
        </div>
    </nav>
</header>
