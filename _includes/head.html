<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <!-- Meta Title -->
    <title>
        {%- if page.url == "/" -%}
        {{ site.title }} - Premium Handcrafted Donuts
        {%- elsif page.title -%}
        {{ page.title }} | {{ site.title }}
        {%- else -%}
        {{ site.title }}
        {%- endif -%}
    </title>

    <!-- SEO Plugin -->
    {%- seo -%}

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <!-- Custom Fonts -->
    <style>
        @font-face {
            font-family: 'Konigsberg';
            src: url('https://fonts.cdnfonts.com/s/25992/Konigsberg.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        
        @font-face {
            font-family: 'Erita';
            src: url('https://fonts.cdnfonts.com/s/25992/Erita.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        
        .font-konigsberg {
            font-family: 'Konigsberg', 'Montserrat', sans-serif;
        }
        
        .font-erita {
            font-family: 'Erita', 'Poppins', sans-serif;
        }
    </style>

    <!-- Compiled CSS from Tailwind (includes typography base, animations, and utilities) -->
    <link rel="stylesheet" href="{{ '/assets/css/output.css' | relative_url }}" />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest" defer></script>

    <!-- RSS Feed -->
    <link rel="alternate" type="application/rss+xml" href="{{ site.url }}/feed.xml">

    <!-- Google Analytics -->
    {%- if jekyll.environment == 'production' and site.google_analytics -%}
        {%- include google-analytics.html -%}
    {%- endif -%}
</head>
