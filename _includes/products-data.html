<!-- Products Data - Exposed to JavaScript from Jekyll data -->
<script>
window.productsData = {
  {% for category in site.data.products %}
    {% if category[0] != 'categories' %}
    "{{ category[0] }}": [
    {% for product in category[1] %}
      {
        "id": {{ product.id }},
        "name": "{{ product.name }}",
        "description": "{{ product.description }}",
        "price": {{ product.price }},
        {% if product.original_price %}"original_price": {{ product.original_price }},{% endif %}
        {% if product.image %}"image": "{{ product.image }}",{% endif %}
        "category": "{{ product.category }}"
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
    ]{% unless forloop.last %},{% endunless %}
    {% endif %}
  {% endfor %}
};

// Flatten products into a single array for easier access
window.allProducts = [];
Object.values(window.productsData).forEach(category => {
  window.allProducts = window.allProducts.concat(category);
});

// Extract categories from products data or from explicit categories section
window.productCategories = [];
{% if site.data.products.categories %}
  {% for cat in site.data.products.categories %}
    window.productCategories.push({
      id: "{{ cat.id }}",
      name: "{{ cat.name }}",
      display_name: "{{ cat.display_name }}"
    });
  {% endfor %}
{% else %}
  Object.keys(window.productsData).forEach(key => {
    window.productCategories.push({
      id: key,
      name: key.charAt(0).toUpperCase() + key.slice(1).replace('-', ' '),
      display_name: key.charAt(0).toUpperCase() + key.slice(1).replace('-', ' ')
    });
  });
{% endif %}

console.log('Products loaded from Jekyll data:', window.allProducts.length, 'items');
console.log('Categories loaded:', window.productCategories.length, 'categories');
</script>
